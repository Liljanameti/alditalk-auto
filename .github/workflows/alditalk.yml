name: alditalk-extender

on:
  schedule:
    # Safety net: every 3h, in case the self-dispatch chain ever breaks.
    # The actual cadence comes from the in-job loop + workflow_dispatch chain
    # below (workflow_dispatch is NOT throttled like `schedule:` is).
    - cron: "0 */3 * * *"
  workflow_dispatch:

concurrency:
  group: alditalk-extender
  cancel-in-progress: false

permissions:
  contents: read
  actions: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Chromium system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ca-certificates fonts-liberation libasound2t64 libatk-bridge2.0-0 \
            libatk1.0-0 libc6 libcairo2 libcups2 libdbus-1-3 libexpat1 \
            libfontconfig1 libgbm1 libgcc-s1 libglib2.0-0 libgtk-3-0 \
            libnspr4 libnss3 libpango-1.0-0 libx11-6 libx11-xcb1 libxcb1 \
            libxcomposite1 libxcursor1 libxdamage1 libxext6 libxfixes3 \
            libxi6 libxrandr2 libxrender1 libxss1 libxtst6 lsb-release \
            wget xdg-utils

      - name: Install npm deps
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run extension loop
        env:
          RUN_ONCE: "1"
          USERNAME: ${{ secrets.ALDITALK_USERNAME }}
          PASSWORD: ${{ secrets.ALDITALK_PASSWORD }}
        run: |
          set -u
          start=$(date +%s)
          # Stay inside this job for ~5h40m, leaving buffer for the
          # successor-dispatch step before the 6h hosted-runner ceiling.
          deadline=$((start + 5*3600 + 40*60))
          iter=0
          while :; do
            iter=$((iter + 1))
            echo "::group::iteration $iter at $(date -u +%FT%TZ)"
            node dist/index.js || echo "iteration $iter failed (non-fatal, continuing)"
            echo "::endgroup::"
            now=$(date +%s)
            if [ "$now" -ge "$deadline" ]; then
              echo "Deadline reached after $iter iterations; exiting loop to dispatch successor."
              break
            fi
            sleep 600
          done

      - name: Dispatch successor run
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run alditalk.yml --ref ${{ github.ref_name }}

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_id }}
          path: screenshots/
          retention-days: 3
          if-no-files-found: ignore
